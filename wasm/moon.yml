# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'library'
language: 'rust'

tasks:
  # Embeddable wasm-bindgen artifact (JWT helpers only — mirrors `make wasm`).
  build:
    command: 'cargo build -p authdog-cli-wasm --release --target wasm32-unknown-unknown'
    options:
      cache: false
