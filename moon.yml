# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'application'
language: 'rust'

tasks:
  # Equivalent of the former `bazel build //:authdog-cli`: the desktop binary.
  build:
    command: 'cargo build --release'
    options:
      cache: false

  # Equivalent of the former `bazel test //:authdog_cli_lib_test`: library unit
  # tests (`src/tui_output.rs` tests stay on `cargo test` only).
  test:
    command: 'cargo test --lib'
    options:
      cache: false
