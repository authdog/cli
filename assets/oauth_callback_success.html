<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <link rel="icon" href="https://api.authdog.com/favicon.ico" sizes="any" />
    <!-- Rebuild the CLI (`cargo build` / reinstall) — this file is inlined with include_str!. -->
    <title>Signed in — Authdog CLI</title>
    <style>
      :root {
        --line: rgba(15, 23, 42, 0.1);
        --text: #0f172a;
        --text-secondary: #334155;
        --text-muted: #64748b;
        --glass-bg: rgba(255, 255, 255, 0.55);
        --glass-border: rgba(255, 255, 255, 0.75);
        --glass-highlight: rgba(255, 255, 255, 0.95);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        -webkit-font-smoothing: antialiased;
        background-color: #f1f5f9;
        background-image:
          radial-gradient(ellipse 95% 80% at 80% 36%, rgba(167, 139, 250, 0.42) 0%, transparent 58%),
          radial-gradient(ellipse 85% 70% at 12% 90%, rgba(56, 189, 248, 0.38) 0%, transparent 52%),
          radial-gradient(ellipse 110% 85% at 48% -8%, rgba(255, 255, 255, 0.95) 0%, transparent 50%),
          linear-gradient(165deg, #f8fafc 0%, #eef2ff 38%, #e0f2fe 100%);
        background-repeat: no-repeat;
        background-size: cover;
      }

      .shell {
        width: min(28rem, 100%);
      }

      .card {
        position: relative;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        padding: 2rem 1.75rem 1.75rem;
        box-shadow:
          0 4px 6px rgba(15, 23, 42, 0.04),
          0 20px 45px rgba(99, 102, 241, 0.08),
          inset 0 1px 0 var(--glass-highlight);
        -webkit-backdrop-filter: blur(18px) saturate(140%);
        backdrop-filter: blur(18px) saturate(140%);
      }

      @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
        .card {
          background: rgba(255, 255, 255, 0.92);
          box-shadow:
            0 4px 6px rgba(15, 23, 42, 0.06),
            0 20px 45px rgba(99, 102, 241, 0.1);
        }
      }

      .brand-logo {
        margin: 0 auto 1.35rem;
        width: fit-content;
      }

      .brand-logo img {
        display: block;
        height: 3rem;
        width: 3rem;
        object-fit: contain;
      }

      .brand-logo svg {
        display: block;
        height: 3rem;
        width: auto;
        max-width: min(100%, 12rem);
      }

      .kicker {
        margin: 0 0 1.25rem;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        letter-spacing: 0.02em;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.015em;
        line-height: 1.35;
        color: var(--text);
      }

      .lead {
        margin: 0 0 1.25rem;
        font-size: 0.875rem;
        line-height: 1.55;
        color: var(--text-secondary);
      }

      .step {
        margin: 0;
        padding: 0;
        border: none;
        font-size: 0.875rem;
        line-height: 1.55;
        color: var(--text-secondary);
      }

      .step strong {
        font-weight: 600;
        color: var(--text);
      }

      hr {
        border: none;
        border-top: 1px solid var(--line);
        margin: 1.25rem 0;
      }
    </style>
  </head>

        </div>
        <p class="kicker">Authdog CLI</p>
        <h1>You’re signed in</h1>
        <hr />
        <p class="step">
          <strong>You can close this tab.</strong>
          <br />
          Return to the terminal where you ran the CLI to continue.
        </p>
      </article>
    </main>
  </body>
</html>
