name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cargo fmt (check)
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  build-test:
    name: Build / test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cargo build
        run: cargo build --locked --verbose

      - name: Cargo test
        run: cargo test --locked --verbose --all-targets

  bazel:
    name: Bazel build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Restore/save repo + disk + external caches keyed by lockfiles/manifests; see
      # https://github.com/bazel-contrib/setup-bazel/blob/main/README.md
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          # Bump when deliberately invalidating CI cache (rules upgrade, breakage, …).
          cache-version: '1'
          disk-cache: ${{ github.workflow }}
          repository-cache: |
            - MODULE.bazel
            - MODULE.bazel.lock
            - Cargo.toml
            - Cargo.lock
          # rules_rust + downloaded toolchains/archives often land in externals (>10MiB).
          external-cache: true
          # PRs consume default-branch caches but avoid writing polluted keys back.
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Bazel build (desktop CLI)
        run: bazel build //:authdog-cli

      - name: Bazel test (library unit tests)
        run: bazel test //:authdog_cli_lib_test
