name: Create release tag

# Creates/pushes annotated tag from `./Cargo.toml`:
# - `[package.metadata.authdog-release].stable=false` → `v{version}-beta.{n}` (n increments)
# - `stable=true` → `v{version}`
# Workflow ref selects the commit Actions tags. Push triggers `.github/workflows/release.yml`.

permissions:
  contents: write

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  push-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        env:
          RELEASE_FETCH_TAGS: "1"
        run: |
          set -euo pipefail
          tag=$(python3 scripts/compute_release_tag.py)
          printf '%s\n' "Next release tag: $tag"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Ensure tag is new
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch origin --tags 2>/dev/null || true
          if git rev-parse -q --verify "refs/tags/${TAG}^{}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists locally in this clone."
            exit 1
          fi
          existing=$(git ls-remote origin "refs/tags/${TAG}" || true)
          if [[ -n "${existing:-}" ]]; then
            echo "::error::Tag ${TAG} already exists on the remote:"
            printf '%s\n' "$existing"
            exit 1
          fi

      - name: Create and push annotated tag
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}" "${SHA}"
          git push origin "${TAG}"
